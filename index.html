<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRT Live Stream</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            color: #fff;
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 { margin-bottom: 1rem; font-size: 1.5rem; }
        #videoWrap {
            position: relative;
            width: 90vw;
            max-width: 1280px;
            display: none;
        }
        #player {
            width: 100%;
            background: #000;
        }
        #status {
            margin-top: 1rem;
            color: #aaa;
            font-size: 0.9rem;
        }
        #watchBtn {
            margin-top: 1.5rem;
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        #watchBtn:hover { background: #1d4ed8; }
        #watchBtn:disabled { background: #555; cursor: not-allowed; }
        #watchBtn.hidden { display: none; }
    </style>
</head>
<body>
    <h1>SRT Live Stream</h1>
    <div id="videoWrap">
        <video id="player" controls autoplay muted playsinline></video>
    </div>
    <div id="status">Click to start watching the stream.</div>
    <button id="watchBtn">Start Watching</button>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const video = document.getElementById('player');
        const videoWrap = document.getElementById('videoWrap');
        const statusEl = document.getElementById('status');
        const watchBtn = document.getElementById('watchBtn');
        const hlsUrl = '/hls/stream.m3u8';
        let hls = null;
        let recovering = false;

        watchBtn.addEventListener('click', startStream);

        function startStream() {
            watchBtn.disabled = true;
            watchBtn.classList.add('hidden');
            videoWrap.style.display = 'block';
            statusEl.textContent = 'Starting stream...';

            fetch('/api/start')
                .then(() => waitForPlaylist())
                .catch(() => {
                    statusEl.textContent = 'Failed to connect to server.';
                    showWatchButton();
                });
        }

        function waitForPlaylist() {
            fetch(hlsUrl, { method: 'HEAD' })
                .then(res => {
                    if (res.ok) {
                        startPlayer();
                    } else {
                        statusEl.textContent = 'Waiting for stream to begin...';
                        setTimeout(waitForPlaylist, 2000);
                    }
                })
                .catch(() => {
                    statusEl.textContent = 'Waiting for stream to begin...';
                    setTimeout(waitForPlaylist, 2000);
                });
        }

        function startPlayer() {
            if (hls) {
                hls.destroy();
                hls = null;
            }
            recovering = false;

            if (Hls.isSupported()) {
                hls = new Hls({
                    liveSyncDurationCount: 3,
                    liveMaxLatencyDurationCount: 6,
                    liveDurationInfinity: true,
                    enableWorker: true,
                    lowLatencyMode: true,
                    manifestLoadingMaxRetry: 10,
                    manifestLoadingRetryDelay: 2000,
                    levelLoadingMaxRetry: 10,
                    levelLoadingRetryDelay: 2000,
                    fragLoadingMaxRetry: 10,
                    fragLoadingRetryDelay: 2000,
                });
                hls.loadSource(hlsUrl);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    onStreamConnected();
                });

                // Detect recovery success: fragments loading again after error
                hls.on(Hls.Events.FRAG_LOADED, () => {
                    if (recovering) {
                        recovering = false;
                        statusEl.textContent = 'Stream connected.';
                    }
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (!data.fatal) return;

                    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                        if (!recovering) {
                            recovering = true;
                            statusEl.textContent = 'Connection lost. Recovering...';
                            hls.startLoad();
                            return;
                        }
                    } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                        if (!recovering) {
                            recovering = true;
                            statusEl.textContent = 'Media error. Recovering...';
                            hls.recoverMediaError();
                            return;
                        }
                    }

                    statusEl.textContent = 'Stream interrupted. Reconnecting...';
                    hls.destroy();
                    hls = null;
                    reconnect();
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = hlsUrl;
                video.addEventListener('loadedmetadata', () => {
                    onStreamConnected();
                });
                video.addEventListener('error', () => {
                    statusEl.textContent = 'Stream interrupted. Reconnecting...';
                    reconnect();
                });
            } else {
                statusEl.textContent = 'HLS is not supported in this browser.';
            }
        }

        function onStreamConnected() {
            statusEl.textContent = 'Stream connected.';
            recovering = false;
            // Start muted (required by browsers), then unmute immediately
            video.muted = true;
            video.play().then(() => {
                video.muted = false;
            }).catch(() => {});
        }

        function reconnect() {
            fetch('/api/start')
                .then(() => {
                    setTimeout(waitForPlaylist, 3000);
                })
                .catch(() => {
                    setTimeout(reconnect, 5000);
                });
        }

        function showWatchButton() {
            videoWrap.style.display = 'none';
            watchBtn.disabled = false;
            watchBtn.classList.remove('hidden');
        }
    </script>
</body>
</html>
